name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/fixitnow" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./FixItNow
          file: ./FixItNow/FixItNow/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare EC2 server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -euo pipefail
            mkdir -p /tmp/fixitnow-deploy

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          source: "docker-compose.prod.yml,scripts/ec2-bootstrap.sh"
          target: "/tmp/fixitnow-deploy"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -euo pipefail
            export APP_DIR=/opt/fixitnow
            bash /tmp/fixitnow-deploy/scripts/ec2-bootstrap.sh
            mkdir -p "$APP_DIR"
            cp /tmp/fixitnow-deploy/docker-compose.prod.yml "$APP_DIR/docker-compose.yml"
            cat > "$APP_DIR/.env" <<'ENVEOF'
            IMAGE_NAME=${{ env.IMAGE_NAME }}:${{ github.sha }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ENVEOF
            cd "$APP_DIR"
            DOCKER="docker"
            if ! docker ps >/dev/null 2>&1; then
              DOCKER="sudo docker"
            fi
            echo "${{ secrets.GITHUB_TOKEN }}" | $DOCKER login ghcr.io -u "${{ github.actor }}" --password-stdin
            $DOCKER compose pull
            $DOCKER compose up -d --remove-orphans
            $DOCKER image prune -f
